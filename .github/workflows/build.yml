name: "build cache"
on:
  pull_request:
  push:
    paths-ignore:
      - '**.md'
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15]
    runs-on: ${{ matrix.os }}
    env:
      GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0       ## not shallow
        filter: 'blob:none'  ## but blob-less
        submodules: true
    - uses: wimpysworld/nothing-but-nix@10c936d9e46521bf923f75458e0cbd4fa309300d # main
      if: matrix.os == 'ubuntu-latest'
    - uses: cachix/install-nix-action@6ed004b9ccb68dbc28e7c85bee15fa93dbd214ac # v22
      with:
        nix_path: nixpkgs=channel:nixpkgs-unstable
        install_url: https://releases.nixos.org/nix/nix-2.31.2/install
        extra_nix_config: |
          experimental-features = nix-command flakes fetch-closure configurable-impure-env
          impure-env = GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
          trusted-users = root runner @wheel
    - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
      with:
        name: chezbryan
        authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
        extraPullNames: nix-community
    - run: nix config show
    - run: ./build.sh --dry-run
    - name: Build
      id: build
      run: |
        set -euo pipefail

        ./build.sh
        out_path=$(readlink result)
        echo "out_path=$out_path" >> "$GITHUB_OUTPUT"

    - name: Report store paths
      env:
        OUT_PATH: ${{ steps.build.outputs.out_path }}
      run: |
        set -euo pipefail

        echo "::notice title=nix-store-path (${{ matrix.os }})::$OUT_PATH"

        {
          echo "## Nix store paths (${{ matrix.os }})"
          echo
          echo "**built output:** \`$OUT_PATH\`"
          echo
          echo "| entry | store path |"
          echo "| --- | --- |"
          find "$OUT_PATH" -mindepth 1 -maxdepth 1 -type l -print \
            | sort \
            | while IFS= read -r entry; do
                name=$(basename "$entry")
                target=$(readlink "$entry")
                echo "| \`$name\` | \`$target\` |"
              done
        } >> "$GITHUB_STEP_SUMMARY"
